name = "garfield-ledger"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 静态资源目录
assets = { directory = "./public", binding = "ASSETS" }

# S3 兼容存储配置 (通过环境变量传入)
[vars]
S3_REGION = "auto"
S3_BUCKET = "garfield-ledger"

# AI 模型配置 (通过环境变量传入)
AI_PROVIDER = "gemini"

# 环境变量 (通过 .dev.vars 或 Cloudflare Dashboard 设置)
# S3_ENDPOINT, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, JWT_SECRET, GEMINI_API_KEY
